services:
  - type: web
    name: compass-minerals-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      # Store the SQLite DB on the persistent disk so data survives redeploys.
      - key: DATA_DIR
        value: /var/data
    # NOTE: access control is expected to be enforced by the hosting layer via the
    # company's Microsoft sign-in (Azure Easy Auth / Entra / identity-aware proxy).
    # The app itself has no login. If deploying on plain Render, put it behind such
    # a gate, or it will be publicly reachable.
    # A persistent disk keeps server-side data across deploys (required, since
    # the SQLite file is the source of truth once the app is live).
    disk:
      name: compass-data
      mountPath: /var/data
      sizeGB: 1
